tools:
  - class_name: "verl.tools.computer_13_tool.Computer13Tool"
    config:
      type: native
      url: "http://127.0.0.1:8000/computer_13/call"
      timeout: 30
      max_image_bytes: 10485760

    tool_schema:
      type: "function"
      function:
        name: "computer_13"
        description: "Execute ordered GUI actions in OSWorld computer_13 and return a text observation plus at most one screenshot."
        parameters:
          type: "object"
          properties:
            actions:
              type: "array"
              description: "Ordered list of computer_13 actions. Each item must be an object using the table-defined action space only: MOVE_TO(x,y), CLICK(button,x,y,num_clicks), MOUSE_DOWN(button), MOUSE_UP(button), RIGHT_CLICK(x,y), DOUBLE_CLICK(x,y), DRAG_TO(x,y), SCROLL(dx,dy), TYPING(text), PRESS(key), KEY_DOWN(key), KEY_UP(key), HOTKEY(keys), WAIT, FAIL, DONE. request_id and task_id are injected by the tool adapter, not generated by the model."
          required: ["actions"]
